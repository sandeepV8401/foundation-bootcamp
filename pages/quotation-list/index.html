<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quotation List</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        .section {
            width: 1200px;
            margin: 20px auto;
            background-color: #f4f6f9;
            padding: 16px;
            border-radius: 8px;
        }

        .container {
            display: flex;
            flex-direction: column;
        }

        .head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: white;
            border-radius: 6px;
            margin-bottom: 16px;
        }

        .head h2 {
            font-size: 18px;
        }

        .right {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .search input {
            padding: 6px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .btn {
            background: #2563eb;
            color: white;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }

        .table {
            background: white;
            border-radius: 6px;
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #eef2f7;
            font-size: 14px;
            font-weight: 600;
        }

        th,
        td {
            padding: 12px;
            text-align: left;
        }

        tbody tr {
            border-top: 1px solid #eee;
        }

        tbody tr:hover {
            background: #f9fafb;
        }

        td:last-child a {
            margin-right: 10px;
            color: #2563eb;
            text-decoration: none;
            font-size: 13px;
        }

        /* Status badges */
        .badge {
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 12px;
        }

        .sent {
            background: #e0f2fe;
            color: #0369a1;
        }

        .approved {
            background: #dcfce7;
            color: #166534;
        }

        .pending {
            background: #fef9c3;
            color: #854d0e;
        }
    </style>
</head>

<body>

    <section class="section">
        <div class="container">

            <!-- Header -->
            <div class="head">
                <h2>Quotations</h2>

                <div class="right">
                    <div class="search">
                        <input type="text" placeholder="Search..." />
                        <i class="fa fa-search"></i>
                    </div>

                    <div class="btn">
                        + New Quote
                    </div>
                </div>
            </div>

            <!-- Table -->
            <div class="table">
                <table>
                    <thead>
                        <tr>
                            <th>Enquiry #</th>
                            <th>Quote #</th>
                            <th>Customer</th>
                            <th>Amount</th>
                            <th>Status</th>
                            <th>Date</th>
                            <th>Action</th>
                        </tr>
                    </thead>

                    <tbody>
                        <tr>
                            <td>#E101</td>
                            <td>#Q1021</td>
                            <td>ABC Corp</td>
                            <td>₹50,000</td>
                            <td><span class="badge sent">Sent</span></td>
                            <td>15 Apr 2026</td>
                            <td>
                                <a href="#">View</a>
                                <a href="#">Edit</a>
                            </td>
                        </tr>

                        <tr>
                            <td>#E101</td>
                            <td>#Q1022</td>
                            <td>ABC Corp</td>
                            <td>₹45,000</td>
                            <td><span class="badge pending">Pending</span></td>
                            <td>16 Apr 2026</td>
                            <td>
                                <a href="#">View</a>
                                <a href="#">Edit</a>
                            </td>
                        </tr>

                        <tr>
                            <td>#E102</td>
                            <td>#Q1023</td>
                            <td>XYZ Pvt Ltd</td>
                            <td>₹75,000</td>
                            <td><span class="badge approved">Approved</span></td>
                            <td>14 Apr 2026</td>
                            <td>
                                <a href="#">View</a>
                                <a href="#">Edit</a>
                            </td>
                        </tr>

                    </tbody>
                </table>
            </div>

        </div>
    </section>

</body>

</html>
