<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing Page</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;

        }

        .container {
            width: 1200px;
            margin: 0 auto;
            display: flex;
            /* background-color: aqua; */
            justify-content: center;

        }

        .landing-page {
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            gap: 80px;
            width: 100%;
            padding: 50px;
        }

        .top {
            /* width:100%; */
            background-color: antiquewhite;
            display: flex;
            padding: 10px 20px;
            justify-content: space-between;
            margin: 0 100px;

        }

        .right {
            display: flex;
            gap: 15px;
        }

        .middle {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .bottom {
            display: flex;
            justify-content: center;
            gap: 15px;
        }
    </style>
</head>

<body>
    <div class="container">
        <section class="landing-page">
            <div class="top">
                <div class="left">
                    <img src="" alt="logo" />
                </div>
                <div class="right">
                    <a href="#">Docs</a>
                    <a href="#">About</a>
                    <a href="#">Contact</a>
                </div>

            </div>
            <div class="middle">
                <p>SalesFlow CRM</p>
                <p>Manage Enquiry → Quotation → PO in one place </p>
            </div>
            <div class="bottom buttons">
                <button>Login</button>
                <button>Signup</button>
            </div>
        </section>
    </div>

</body>

</html>
